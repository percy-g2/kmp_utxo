name: Release

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: "What to build"
        required: true
        type: choice
        options:
          - both
          - android
          - web
        default: both
      version_override:
        description: "Version tag override (leave blank to auto-increment patch from version.properties, e.g. 0.4.2 -> v0.4.3)"
        required: false
        type: string
        default: ""
      pre_release:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
      build_aab:
        description: "Also build AAB (Android App Bundle)"
        required: false
        type: boolean
        default: false
      deploy_web:
        description: "Deploy web build to GitHub Pages"
        required: false
        type: boolean
        default: true
      deploy_play_store:
        description: "Upload AAB to Google Play Store"
        required: false
        type: boolean
        default: false
      play_track:
        description: "Play Store track (if deploy_play_store is true)"
        required: false
        type: choice
        options:
          - internal
          - production
        default: internal

permissions:
  contents: write
  pages: write

jobs:
  # ──────────────────────────────────────────────
  # Resolve version tag + generate changelog
  # ──────────────────────────────────────────────
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
      new_name: ${{ steps.version.outputs.new_name }}
      new_code: ${{ steps.version.outputs.new_code }}
      prev_tag: ${{ steps.version.outputs.prev_tag }}
      changelog: ${{ steps.changelog.outputs.changelog }}
      play_release_notes: ${{ steps.changelog.outputs.play_release_notes }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          PREV_VER="${PREV_TAG#v}"
          BASE_NAME=$(grep '^versionName=' version.properties | cut -d= -f2)

          if [ -n "${{ inputs.version_override }}" ]; then
            NEW_TAG="${{ inputs.version_override }}"
            NEW_NAME="${NEW_TAG#v}"
          else
            # Floor = highest of (version.properties, latest git tag).
            # Lets the file act as a manual jump (e.g. set to 1.0.0 for major bump)
            # while normally auto-progressing from the last released tag.
            HIGHEST=$(printf '%s\n%s\n' "${PREV_VER:-0.0.0}" "${BASE_NAME:-0.0.0}" | sort -V | tail -n1)
            IFS='.' read -r MAJOR MINOR PATCH <<< "$HIGHEST"
            PATCH=$((PATCH + 1))
            NEW_NAME="${MAJOR}.${MINOR}.${PATCH}"
            NEW_TAG="v${NEW_NAME}"
          fi

          # versionCode is derived from versionName: MAJOR*10000 + MINOR*100 + PATCH.
          # Deterministic and monotonic as long as MINOR/PATCH stay <100 (more than enough headroom).
          IFS='.' read -r N_MAJOR N_MINOR N_PATCH <<< "$NEW_NAME"
          NEW_CODE=$((N_MAJOR * 10000 + N_MINOR * 100 + N_PATCH))

          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "::error::Tag $NEW_TAG already exists. Pass version_override with a higher version."
            exit 1
          fi

          {
            echo "prev_tag=${PREV_TAG}"
            echo "new_tag=${NEW_TAG}"
            echo "new_name=${NEW_NAME}"
            echo "new_code=${NEW_CODE}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved: file=${BASE_NAME:-<none>} tag=${PREV_TAG:-<none>} -> ${NEW_TAG} (code ${NEW_CODE})"

      - name: Create and push tag
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG="${{ steps.version.outputs.prev_tag }}"
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          REPO="${{ github.repository }}"
          BUILD_TARGET="${{ inputs.build_target }}"

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          RAW_LOG=$(git log "$RANGE" --pretty=format:"%s" --no-merges 2>/dev/null || echo "")

          FEATS=""
          FIXES=""
          IMPROVEMENTS=""
          OTHERS=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue

            # Extract type and clean message: "type(scope): msg" or "type: msg" or plain msg
            if echo "$line" | grep -qE '^(feat|fix|refactor|perf|docs|style|test|chore)(\(.*\))?:'; then
              TYPE=$(echo "$line" | sed -E 's/^([a-z]+)(\(.*\))?:.*/\1/')
              MSG=$(echo "$line" | sed -E 's/^[a-z]+(\(.*\))?: *//')
            else
              TYPE="other"
              MSG="$line"
            fi

            # Capitalize first letter of message
            MSG="$(echo "${MSG:0:1}" | tr '[:lower:]' '[:upper:]')${MSG:1}"

            case "$TYPE" in
              feat)
                FEATS="${FEATS}- ${MSG}\n"
                ;;
              fix)
                FIXES="${FIXES}- ${MSG}\n"
                ;;
              refactor|perf)
                IMPROVEMENTS="${IMPROVEMENTS}- ${MSG}\n"
                ;;
              *)
                OTHERS="${OTHERS}- ${MSG}\n"
                ;;
            esac
          done <<< "$RAW_LOG"

          # Compute Play Store release notes up-front (capped at 500 chars, Play's limit)
          PLAY_NOTES=""
          if [ -n "$FEATS" ]; then
            PLAY_NOTES="${PLAY_NOTES}$(echo -e "$FEATS")"
          fi
          if [ -n "$FIXES" ]; then
            PLAY_NOTES="${PLAY_NOTES}$(echo -e "$FIXES")"
          fi
          if [ -n "$IMPROVEMENTS" ]; then
            PLAY_NOTES="${PLAY_NOTES}$(echo -e "$IMPROVEMENTS")"
          fi
          if [ -z "$PLAY_NOTES" ]; then
            PLAY_NOTES="- Bug fixes and performance improvements"
          fi
          PLAY_NOTES=$(echo "$PLAY_NOTES" | head -c 500)

          {
            echo "play_release_notes<<PLAY_NOTES_EOF"
            echo "$PLAY_NOTES"
            echo "PLAY_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "changelog<<CHANGELOG_EOF"

            if [ -n "$PREV_TAG" ]; then
              echo "## What's Changed ($PREV_TAG -> $NEW_TAG)"
            else
              echo "## What's Changed ($NEW_TAG)"
            fi
            echo ""

            if [ -n "$FEATS" ]; then
              echo "### New Features"
              echo -e "$FEATS"
            fi

            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo -e "$FIXES"
            fi

            if [ -n "$IMPROVEMENTS" ]; then
              echo "### Improvements"
              echo -e "$IMPROVEMENTS"
            fi

            if [ -n "$OTHERS" ]; then
              echo "### Other Changes"
              echo -e "$OTHERS"
            fi

            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREV_TAG}...${NEW_TAG}"
            fi

            if [ "$BUILD_TARGET" = "android" ] || [ "$BUILD_TARGET" = "both" ]; then
              echo ""
              echo "---"
              echo ""
              echo "<details>"
              echo "<summary><strong>Google Play Store Release Notes</strong></summary>"
              echo ""
              echo '```'
              echo "$PLAY_NOTES"
              echo '```'
              echo ""
              echo "</details>"
            fi

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────
  # Build signed Android APK
  # ──────────────────────────────────────────────
  build-android:
    name: Build Android APK
    needs: prepare
    if: inputs.build_target == 'android' || inputs.build_target == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.new_tag }}
          fetch-depth: 1

      - name: Sync version files in workspace
        run: bash scripts/bump-version.sh "${{ needs.prepare.outputs.new_name }}" "${{ needs.prepare.outputs.new_code }}"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "${RUNNER_TEMP}/release.jks"

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :androidApp:assembleRelease

      - name: Build release AAB
        if: inputs.build_aab || inputs.deploy_play_store
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :androidApp:bundleRelease

      - name: Rename APK
        run: |
          TAG="${{ needs.prepare.outputs.new_tag }}"
          APK=$(find androidApp/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" "${RUNNER_TEMP}/UTXO-${TAG}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: ${{ runner.temp }}/UTXO-${{ needs.prepare.outputs.new_tag }}.apk
          retention-days: 30

      - name: Rename AAB
        if: inputs.build_aab || inputs.deploy_play_store
        run: |
          TAG="${{ needs.prepare.outputs.new_tag }}"
          AAB=$(find androidApp/build/outputs/bundle/release -name "*.aab" | head -1)
          cp "$AAB" "${RUNNER_TEMP}/UTXO-${TAG}.aab"

      - name: Upload AAB artifact
        if: inputs.build_aab || inputs.deploy_play_store
        uses: actions/upload-artifact@v7
        with:
          name: android-aab
          path: ${{ runner.temp }}/UTXO-${{ needs.prepare.outputs.new_tag }}.aab
          retention-days: 30

      - name: Write Play release notes
        if: inputs.deploy_play_store
        env:
          PLAY_NOTES: ${{ needs.prepare.outputs.play_release_notes }}
        run: |
          mkdir -p androidApp/src/main/play/release-notes/en-US
          printf '%s' "$PLAY_NOTES" > androidApp/src/main/play/release-notes/en-US/default.txt

      - name: Decode Play service account
        if: inputs.deploy_play_store
        run: |
          echo "${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}" | base64 -d > "${RUNNER_TEMP}/play-sa.json"

      - name: Publish to Play Store
        if: inputs.deploy_play_store
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_PUBLISHER_CREDENTIALS: ${{ runner.temp }}/play-sa.json
        run: |
          ./gradlew :androidApp:publishReleaseBundle \
            -Pplay.track=${{ inputs.play_track }} \
            -Pplay.status=COMPLETED

  # ──────────────────────────────────────────────
  # Build Web (wasmJs) + optional Pages deploy
  # ──────────────────────────────────────────────
  build-web:
    name: Build Web
    needs: prepare
    if: inputs.build_target == 'web' || inputs.build_target == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.new_tag }}
          fetch-depth: 1

      - name: Sync version files in workspace
        run: bash scripts/bump-version.sh "${{ needs.prepare.outputs.new_name }}" "${{ needs.prepare.outputs.new_code }}"

      - name: Build wasmJs distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution

      - name: Deploy to GitHub Pages
        if: inputs.deploy_web && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          BRANCH: gh-pages
          FOLDER: composeApp/build/dist/wasmJs/productionExecutable
          CLEAN: true
          TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - name: Package web distribution
        run: |
          TAG="${{ needs.prepare.outputs.new_tag }}"
          cd composeApp/build/dist/wasmJs/productionExecutable
          zip -r "${RUNNER_TEMP}/UTXO-web-${TAG}.zip" .

      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: ${{ runner.temp }}/UTXO-web-${{ needs.prepare.outputs.new_tag }}.zip
          retention-days: 30

  # ──────────────────────────────────────────────
  # Create GitHub Release with artifacts
  # ──────────────────────────────────────────────
  release:
    name: Create Release
    needs: [prepare, build-android, build-web]
    if: always() && needs.prepare.result == 'success' && (needs.build-android.result == 'success' || needs.build-android.result == 'skipped') && (needs.build-web.result == 'success' || needs.build-web.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Android APK
        if: needs.build-android.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: android-apk
          path: release-assets/

      - name: Download Android AAB
        if: needs.build-android.result == 'success' && (inputs.build_aab || inputs.deploy_play_store)
        uses: actions/download-artifact@v8
        with:
          name: android-aab
          path: release-assets/

      - name: Download web distribution
        if: needs.build-web.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.new_tag }}
          name: UTXO ${{ needs.prepare.outputs.new_tag }}
          body: ${{ needs.prepare.outputs.changelog }}
          prerelease: ${{ inputs.pre_release }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
